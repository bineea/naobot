<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>naobot Dashboard</title>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f7f7f4; color: #1f2933; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; background: #17202a; color: #fff; }
    main { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 56px); }
    nav { background: #eef1f0; padding: 16px; border-right: 1px solid #d8dedc; }
    nav button { display: block; width: 100%; margin-bottom: 8px; padding: 10px; border: 1px solid #c8d0ce; background: #fff; text-align: left; cursor: pointer; }
    section { display: none; padding: 20px; }
    section.active { display: block; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
    .panel { background: #fff; border: 1px solid #d8dedc; padding: 14px; border-radius: 6px; }
    button.primary { background: #176b87; color: #fff; border: 0; padding: 10px 12px; border-radius: 4px; cursor: pointer; }
    button.danger { background: #b42318; color: #fff; border: 0; padding: 10px 14px; border-radius: 4px; cursor: pointer; }
    input, select { width: 100%; box-sizing: border-box; padding: 8px; margin: 5px 0 10px; border: 1px solid #c8d0ce; border-radius: 4px; }
    pre { white-space: pre-wrap; max-height: 360px; overflow: auto; background: #101820; color: #d1f7c4; padding: 12px; border-radius: 6px; }
    .badge { padding: 3px 8px; border-radius: 999px; background: #d9f99d; color: #365314; }
  </style>
</head>
<body>
  <header>
    <strong>naobot Dashboard</strong>
    <button class="danger" onclick="stopRobot()">急停</button>
  </header>
  <main>
    <nav>
      <button onclick="show('home')">Home</button>
      <button onclick="show('actions')">Actions</button>
      <button onclick="show('agent')">Agent</button>
      <button onclick="show('soul')">Soul</button>
      <button onclick="show('memory')">Memory</button>
      <button onclick="show('routines')">Routines</button>
      <button onclick="show('diagnostics')">Diagnostics</button>
    </nav>
    <div>
      <section id="home" class="active">
        <h2>状态</h2>
        <div class="grid">
          <div class="panel"><strong>模式</strong><p id="mode">-</p></div>
          <div class="panel"><strong>链路</strong><p id="link">-</p></div>
          <div class="panel"><strong>设备在线</strong><p id="robotOnline">-</p></div>
          <div class="panel"><strong>心跳年龄</strong><p id="heartbeatAge">-</p></div>
          <div class="panel"><strong>最后心跳</strong><p id="lastHeartbeat">-</p></div>
          <div class="panel"><strong>电量</strong><p id="battery">-</p></div>
          <div class="panel"><strong>LLM</strong><p id="llm">-</p></div>
          <div class="panel"><strong>控制权</strong><p id="authority">-</p></div>
          <div class="panel"><strong>反射状态</strong><p id="reflex">-</p></div>
          <div class="panel"><strong>运动状态</strong><p id="motion">-</p></div>
          <div class="panel"><strong>最近反射</strong><p id="lastReflex">-</p></div>
        </div>
      </section>
      <section id="actions">
        <h2>动作测试</h2>
        <div class="grid">
          <button class="primary" onclick="sendAction('blink', {})">眨眼</button>
          <button class="primary" onclick="sendAction('set_face', {face:'happy'})">开心脸</button>
          <button class="primary" onclick="sendAction('wave', {level:1})">挥手</button>
          <button class="primary" onclick="sendAction('sit', {})">趴下</button>
          <button class="primary" onclick="sendAction('chirp', {tone:'soft'})">轻提示音</button>
        </div>
      </section>
      <section id="agent">
        <h2>Agent</h2>
        <div class="panel">
          <button class="primary" onclick="debugEvent('touch_head')">模拟摸头</button>
          <button class="primary" onclick="debugEvent('battery_low')">模拟低电</button>
          <button class="primary" onclick="debugEvent('fall_detected')">模拟摔倒</button>
        </div>
      </section>
      <section id="soul">
        <h2>Soul</h2>
        <div class="panel">
          <label>名字</label><input id="soulName" />
          <label>称呼用户</label><input id="userCall" />
          <label>活泼度</label><input id="liveliness" type="number" min="0" max="100" />
          <button class="primary" onclick="saveSoul()">保存</button>
        </div>
      </section>
      <section id="memory">
        <h2>Memory</h2>
        <div class="panel">
          <input id="memoryText" placeholder="待确认记忆" />
          <button class="primary" onclick="suggestMemory()">新增待确认</button>
        </div>
        <div id="memoryList"></div>
      </section>
      <section id="routines">
        <h2>Routines</h2>
        <p>首版只允许白名单动作，并且必须用户确认。</p>
        <div id="routineList"></div>
      </section>
      <section id="diagnostics">
        <h2>日志</h2>
        <pre id="logs"></pre>
      </section>
    </div>
  </main>
  <script>
    let state = {};
    function show(id) {
      document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }
    async function refresh() {
      state = await (await fetch('/api/status')).json();
      document.getElementById('mode').textContent = state.robot.mode;
      document.getElementById('link').textContent = state.robot.link_state || '-';
      document.getElementById('robotOnline').textContent = state.robot.agent_connected ? 'online' : 'offline';
      document.getElementById('heartbeatAge').textContent = state.robot.heartbeat_age_ms == null ? '-' : state.robot.heartbeat_age_ms + ' ms';
      document.getElementById('lastHeartbeat').textContent = state.robot.last_heartbeat_ms || '-';
      document.getElementById('battery').textContent = state.robot.battery_pct + '%';
      document.getElementById('authority').textContent = state.robot.control_authority || '-';
      document.getElementById('reflex').textContent = state.robot.reflex_state || '-';
      document.getElementById('motion').textContent = state.robot.motion_state || '-';
      document.getElementById('lastReflex').textContent = state.robot.last_reflex || '-';
      document.getElementById('llm').innerHTML = state.llm_configured ? '<span class="badge">OpenAI-compatible</span>' : '<span class="badge">规则模拟</span>';
      document.getElementById('soulName').value = state.soul.name;
      document.getElementById('userCall').value = state.soul.user_call;
      document.getElementById('liveliness').value = state.soul.liveliness;
      document.getElementById('logs').textContent = JSON.stringify(state.logs, null, 2);
      loadMemory();
      loadRoutines();
    }
    async function sendAction(name, args) {
      await fetch('/api/actions/test', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name, args})});
      refresh();
    }
    async function stopRobot() {
      await fetch('/api/stop', {method:'POST'});
      refresh();
    }
    async function debugEvent(name) {
      const payload = {type:'event', id:'evt_web_' + Date.now(), seq:1, ts_ms:Date.now(), session_id:'dashboard', priority:3, payload:{name, source:'dashboard', battery_pct:80, posture:'upright'}};
      await fetch('/api/debug/event', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)});
      refresh();
    }
    async function saveSoul() {
      const soul = state.soul;
      soul.name = document.getElementById('soulName').value;
      soul.user_call = document.getElementById('userCall').value;
      soul.liveliness = Number(document.getElementById('liveliness').value);
      await fetch('/api/soul', {method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(soul)});
      refresh();
    }
    async function loadMemory() {
      const items = await (await fetch('/api/memory')).json();
      document.getElementById('memoryList').innerHTML = items.map(m => `<div class="panel">${m.confirmed ? '已确认' : '待确认'}：${m.text} <button onclick="confirmMemory('${m.id}')">确认</button> <button onclick="deleteMemory('${m.id}')">删除</button></div>`).join('');
    }
    async function suggestMemory() {
      const text = document.getElementById('memoryText').value;
      await fetch('/api/memory/suggest', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({text})});
      document.getElementById('memoryText').value = '';
      refresh();
    }
    async function confirmMemory(id) { await fetch(`/api/memory/${id}/confirm`, {method:'POST'}); refresh(); }
    async function deleteMemory(id) { await fetch(`/api/memory/${id}`, {method:'DELETE'}); refresh(); }
    async function loadRoutines() {
      const items = await (await fetch('/api/routines')).json();
      document.getElementById('routineList').innerHTML = items.map(r => `<div class="panel">${r.enabled ? '启用' : '待确认'}：${r.name} <button onclick="confirmRoutine('${r.id}')">确认</button> <button onclick="deleteRoutine('${r.id}')">删除</button></div>`).join('');
    }
    async function confirmRoutine(id) { await fetch(`/api/routines/${id}/confirm`, {method:'POST'}); refresh(); }
    async function deleteRoutine(id) { await fetch(`/api/routines/${id}`, {method:'DELETE'}); refresh(); }
    const ws = new WebSocket((location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws/dashboard');
    ws.onmessage = () => refresh();
    refresh();
  </script>
</body>
</html>
