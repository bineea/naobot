<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>naobot Dashboard</title>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f6f7f8; color: #1f2933; }
    main { max-width: 1080px; margin: 0 auto; padding: 20px; }
    h1, h2 { margin: 0 0 12px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
    .panel { background: #fff; border: 1px solid #d8dee4; border-radius: 6px; padding: 14px; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    button { border: 1px solid #c7ced6; background: #fff; padding: 8px 12px; border-radius: 4px; cursor: pointer; }
    button.danger { color: #b42318; border-color: #f5c2c0; }
    code, pre { background: #0f1720; color: #d7f7d0; border-radius: 6px; padding: 10px; display: block; overflow: auto; }
    ul { list-style: none; padding: 0; margin: 0; }
    li + li { margin-top: 10px; }
    .meta { color: #52606d; font-size: 14px; }
  </style>
</head>
<body>
  <main>
    <h1>naobot Dashboard</h1>
    <div class="grid">
      <section class="panel">
        <h2>媒体健康</h2>
        <div id="mediaHealth">-</div>
      </section>
      <section class="panel">
        <h2>当前身份</h2>
        <div id="currentPerson">-</div>
        <div class="meta" id="sessionTrigger">-</div>
      </section>
      <section class="panel">
        <h2>注册状态</h2>
        <div id="enrollmentState">-</div>
        <div class="row" style="margin-top: 10px;">
          <button onclick="cancelEnrollment()">取消注册</button>
        </div>
      </section>
    </div>

    <section class="panel" style="margin-top: 16px;">
      <h2>人物列表</h2>
      <ul id="peopleList"></ul>
    </section>

    <section class="panel" style="margin-top: 16px;">
      <h2>诊断</h2>
      <pre id="statusDump">-</pre>
    </section>
  </main>

  <script>
    let people = [];

    async function refresh() {
      const status = await (await fetch('/api/status')).json();
      people = await (await fetch('/api/people')).json();

      const media = status.media || {};
      document.getElementById('mediaHealth').textContent =
        `conn=${media.connections ?? 0} fps=${media.fps ?? 0} queue=${media.queue ?? 0} dropped=${media.dropped ?? 0} listening=${media.listening ? 'yes' : 'no'} speaking=${media.speaking ? 'yes' : 'no'}`;
      document.getElementById('currentPerson').textContent = media.current_person || 'unknown';
      document.getElementById('sessionTrigger').textContent = media.session_trigger || '-';
      document.getElementById('enrollmentState').textContent = media.enrollment?.state || '-';
      document.getElementById('statusDump').textContent = JSON.stringify(status, null, 2);
      document.getElementById('peopleList').innerHTML = people.map(person => `
        <li class="panel">
          <div><strong>${person.display_name || person.person_id}</strong></div>
          <div class="meta">${person.person_id}</div>
          <div class="row" style="margin-top: 10px;">
            <button onclick="resetRuntime('${person.person_id}')">Reset Runtime</button>
            <button class="danger" onclick="deletePerson('${person.person_id}')">Delete</button>
          </div>
        </li>
      `).join('');
    }

    async function resetRuntime(personId) {
      await fetch(`/api/people/${personId}/runtime/reset`, { method: 'POST' });
      await refresh();
    }

    async function deletePerson(personId) {
      await fetch(`/api/people/${personId}`, { method: 'DELETE' });
      await refresh();
    }

    async function cancelEnrollment() {
      await fetch('/api/people/enrollment/cancel', { method: 'POST' });
      await refresh();
    }

    const ws = new WebSocket((location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws/dashboard');
    ws.onmessage = () => refresh();
    refresh();
  </script>
</body>
</html>
